<!DOCTYPE html>
<html>
<head>
  <title>Eleto Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#667eea,#764ba2);
    }
    .card{
      background:#fff;
      padding:30px;
      width:320px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      text-align:center;
    }
    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:6px;
      border:1px solid #ccc;
    }
    button{
      width:100%;
      padding:12px;
      background:#667eea;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    .error{
      color:red;
      font-size:13px;
      margin-top:10px;
      min-height:18px;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>Admin Login</h2>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <div id="error" class="error"></div>
  <button onclick="login()">Login</button>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
